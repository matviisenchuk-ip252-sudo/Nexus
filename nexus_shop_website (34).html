<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusSHOP ULTRA</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#050505;
  color:white;
}

/* AUTH UI */
.auth{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.auth-box{
  width:350px;
}

.auth h1{
  font-size:40px;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  background:#0d0d0d;
  border:1px solid #222;
  color:white;
  border-radius:10px;
}

.btn{
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#ff00cc,#ff0099);
  color:white;
  cursor:pointer;
  width:100%;
  margin-top:10px;
}

.switch{
  margin-top:10px;
  text-align:center;
  opacity:0.7;
  cursor:pointer;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:20px;
  background:rgba(0,0,0,0.7);
}

.logo{
  font-size:24px;
  font-weight:bold;
}

/* HERO */
.hero{
  text-align:center;
  padding:80px 20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:#111;
  padding:10px;
  border-radius:10px;
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.hidden{display:none}
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth" class="auth">
<div class="auth-box">

<h1 id="title">Register</h1>

<div id="registerBox">
<input id="regUser" placeholder="Username">
<input id="regEmail" placeholder="Email">
<input id="regPass" type="password" placeholder="Password">
<input id="regPass2" type="password" placeholder="Confirm Password">

<button class="btn" onclick="register()">Register</button>
<div class="switch" onclick="showLogin()">or Login</div>
</div>

<div id="loginBox" class="hidden">
<input id="logUser" placeholder="Username">
<input id="logPass" type="password" placeholder="Password">

<button class="btn" onclick="login()">Login</button>
<div class="switch" onclick="showRegister()">or Register</div>
</div>

<p id="msg"></p>

</div>
</div>

<!-- SITE -->
<div id="app" class="hidden">

<header>
<div class="logo">NexusSHOP</div>
<div>
<span id="user"></span>
<button onclick="logout()">Вийти</button>
</div>
</header>

<div class="hero">
<h1>NEXUS</h1>
<p>Майбутнє техніки ⚡</p>
</div>

<div class="grid" id="products"></div>

</div>

<script>
// USERS
let users = JSON.parse(localStorage.getItem("users")) || {};
let currentUser = localStorage.getItem("currentUser");

// SWITCH UI
function showLogin(){
  document.getElementById('registerBox').classList.add('hidden');
  document.getElementById('loginBox').classList.remove('hidden');
  document.getElementById('title').innerText="Login";
}

function showRegister(){
  document.getElementById('registerBox').classList.remove('hidden');
  document.getElementById('loginBox').classList.add('hidden');
  document.getElementById('title').innerText="Register";
}

// REGISTER
function register(){
  let u = regUser.value;
  let e = regEmail.value;
  let p = regPass.value;
  let p2 = regPass2.value;

  if(!u || !e || !p || !p2){
    msg("Заповни всі поля");
    return;
  }

  if(p !== p2){
    msg("Паролі не співпадають");
    return;
  }

  if(users[u]){
    msg("Користувач вже існує");
    return;
  }

  users[u] = {email:e,password:p};
  localStorage.setItem("users", JSON.stringify(users));

  msg("Успішна реєстрація! Тепер увійди");
  showLogin();
}

// LOGIN
function login(){
  let u = logUser.value;
  let p = logPass.value;

  if(users[u] && users[u].password === p){
    localStorage.setItem("currentUser", u);
    start();
  }else{
    msg("Неправильний логін або пароль");
  }
}

// LOGOUT
function logout(){
  localStorage.removeItem("currentUser");
  location.reload();
}

// MESSAGE
function msg(t){
  document.getElementById('msg').innerText = t;
}

// START APP
function start(){
  document.getElementById('auth').style.display="none";
  document.getElementById('app').style.display="block";
  document.getElementById('user').innerText=currentUser;

  renderProducts();
}

// PRODUCTS
const products=[
{name:"RTX 4090",img:"https://images.unsplash.com/photo-1587202372775-e229f172b9d7"},
{name:"PS5",img:"https://images.unsplash.com/photo-1606813907291-d86efa9b94db"},
{name:"Xbox",img:"https://images.unsplash.com/photo-1621259182978-fbf93132d53d"},
{name:"Monitor",img:"https://images.unsplash.com/photo-1591488320449-011701bb6704"}
];

function renderProducts(){
  let html='';
  products.forEach(p=>{
    html+=`
    <div class="card">
      <img src="${p.img}">
      <p>${p.name}</p>
    </div>`;
  });
  document.getElementById('products').innerHTML=html;
}

// CHECK SESSION
if(currentUser){
  start();
}
</script>

</body>
</html>
