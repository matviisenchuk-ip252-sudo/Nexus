```html
<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusSHOP ULTRA MAX</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#050505;
  color:white;
  transition:.3s;
}

.light{
  background:#f5f5f5;
  color:black;
}

/* AUTH */
.auth{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  width:350px;
  background:#111;
  padding:30px;
  border-radius:20px;
}

input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
  background:#222;
  color:white;
  border:none;
  border-radius:10px;
}

.btn{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#ff00cc,#ff0099);
  color:white;
  cursor:pointer;
  margin-top:5px;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#000;
}

.logo{
  font-weight:bold;
  font-size:22px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:#111;
  padding:10px;
  border-radius:10px;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

/* CART */
.cart{
  position:fixed;
  right:0;
  top:0;
  width:300px;
  height:100%;
  background:#111;
  padding:15px;
  display:none;
}

.hidden{display:none}
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth" class="auth">
<div class="box">
<h2 id="title">Login</h2>

<div id="loginBox">
<input id="logUser" placeholder="Username">
<input id="logPass" type="password" placeholder="Password">
<button class="btn" onclick="login()">Login</button>
<button class="btn" onclick="showRegister()">Register</button>
</div>

<div id="registerBox" class="hidden">
<input id="regUser" placeholder="Username">
<input id="regPass" type="password" placeholder="Password">
<button class="btn" onclick="register()">Create</button>
<button class="btn" onclick="showLogin()">Back</button>
</div>

<p id="msg"></p>
</div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<header>
<div class="logo">NexusSHOP</div>

<div>
<input id="search" placeholder="Пошук..." oninput="render()" style="width:120px;">
<select id="filter" onchange="render()">
<option value="all">Всі</option>
<option value="low">До 100$</option>
<option value="high">100$+</option>
</select>

<button onclick="toggleTheme()">🌙</button>
<button onclick="toggleCart()">🛒 <span id="count">0</span></button>
<button onclick="logout()">Вийти</button>
</div>
</header>

<div class="grid" id="products"></div>

<!-- CART -->
<div id="cart" class="cart">
<h3>Кошик</h3>
<div id="cartItems"></div>
<button class="btn" onclick="checkout()">Оплатити</button>
<button class="btn" onclick="toggleCart()">Закрити</button>
</div>

</div>

<script>
// ===== AUTH =====
let users=JSON.parse(localStorage.getItem("users"))||{};
let currentUser=localStorage.getItem("currentUser");

function showRegister(){
  registerBox.classList.remove("hidden");
  loginBox.classList.add("hidden");
}

function showLogin(){
  registerBox.classList.add("hidden");
  loginBox.classList.remove("hidden");
}

function showMsg(t){
  document.getElementById("msg").innerText=t;
}

function register(){
  let u=regUser.value,p=regPass.value;
  if(!u||!p)return showMsg("Заповни поля");
  if(users[u])return showMsg("Є такий");

  users[u]={password:p};
  localStorage.setItem("users",JSON.stringify(users));
  showMsg("Готово! Тепер увійди");
}

function login(){
  let u=logUser.value,p=logPass.value;
  if(users[u]&&users[u].password===p){
    localStorage.setItem("currentUser",u);
    start();
  }else showMsg("Невірно");
}

function logout(){
  localStorage.removeItem("currentUser");
  location.reload();
}

function start(){
  auth.style.display="none";
  app.style.display="block";
  render();
}

if(currentUser)start();

// ===== DATA =====
let cart=JSON.parse(localStorage.getItem("cart"))||[];
let favs=JSON.parse(localStorage.getItem("favs"))||[];

const products=[
{name:"RTX 4090",price:3000,img:"https://images.unsplash.com/photo-1587202372775-e229f172b9d7"},
{name:"PS5",price:700,img:"https://images.unsplash.com/photo-1606813907291-d86efa9b94db"},
{name:"Xbox",price:600,img:"https://images.unsplash.com/photo-1621259182978-fbf93132d53d"},
{name:"Monitor",price:200,img:"https://images.unsplash.com/photo-1591488320449-011701bb6704"},
{name:"Mouse",price:50,img:"https://images.unsplash.com/photo-1615663245857-ac93bb7c39e7"}
];

// ===== RENDER =====
function render(){
  let s=search.value.toLowerCase();
  let f=filter.value;

  let html="";
  products.filter(p=>{
    let ok=p.name.toLowerCase().includes(s);
    if(f==="low") ok=ok&&p.price<100;
    if(f==="high") ok=ok&&p.price>=100;
    return ok;
  }).forEach((p,i)=>{
    let fav=favs.includes(p.name);

    html+=`
    <div class="card">
      <img src="${p.img}">
      <h4>${p.name}</h4>
      <p>$${p.price}</p>
      <button onclick="add(${i})">Купити</button>
      <button onclick="toggleFav('${p.name}')">${fav?'❤️':'🤍'}</button>
    </div>`;
  });

  products.innerHTML=html;
  update();
}

// ===== CART =====
function add(i){
  cart.push(products[i]);
  save();
}

function save(){
  localStorage.setItem("cart",JSON.stringify(cart));
  localStorage.setItem("favs",JSON.stringify(favs));
  update();
}

function update(){
  count.innerText=cart.length;

  let html="";
  cart.forEach((p,i)=>{
    html+=`${p.name} $${p.price} ❌<br>`;
  });

  cartItems.innerHTML=html;
}

function toggleCart(){
  cart.style.display=cart.style.display==="block"?"none":"block";
}

function checkout(){
  alert("Оплата пройшла ✅");
  cart=[];
  save();
}

// ===== FAV =====
function toggleFav(n){
  if(favs.includes(n))favs=favs.filter(f=>f!==n);
  else favs.push(n);
  save();
  render();
}

// ===== THEME =====
function toggleTheme(){
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
```
