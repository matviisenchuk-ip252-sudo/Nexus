<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusSHOP ULTRA</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#050505;
  color:white;
}

/* AUTH */
.auth{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:radial-gradient(circle,#0a0a0a,#000);
}

.box{
  width:360px;
  padding:30px;
  background:#0d0d0d;
  border-radius:20px;
  box-shadow:0 0 40px rgba(255,0,200,0.2);
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  background:#111;
  border:none;
  color:white;
  border-radius:10px;
}

.btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#ff00cc,#ff0099);
  color:white;
  cursor:pointer;
}

.switch{
  margin-top:10px;
  opacity:0.7;
  cursor:pointer;
}

/* FAKE VERIFY */
.verify{
  margin-top:15px;
  padding:10px;
  background:#111;
  border-radius:10px;
  display:flex;
  align-items:center;
  gap:10px;
  justify-content:center;
  cursor:pointer;
}

.verify.done{
  background:#0f3;
  color:black;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:20px;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
}

.logo{
  font-size:26px;
  font-weight:bold;
  background:linear-gradient(90deg,#00f0ff,#ff00c8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* HERO */
.hero{
  text-align:center;
  padding:80px;
}

.hero h1{
  font-size:70px;
  margin:0;
  background:linear-gradient(90deg,#00f0ff,#ff00c8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:#111;
  padding:10px;
  border-radius:15px;
  transition:.3s;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 0 20px rgba(255,0,200,0.3);
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:10px;
}

.hidden{display:none}
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth" class="auth">
<div class="box">

<h2 id="title">Login</h2>

<div id="loginBox">
<input id="logUser" placeholder="Username">
<input id="logPass" type="password" placeholder="Password">

<div id="verify" class="verify" onclick="verifyCheck()">
☐ I'm not a robot
</div>

<button class="btn" onclick="login()">Login</button>
<div class="switch" onclick="showRegister()">Create account</div>
</div>

<div id="registerBox" class="hidden">
<input id="regUser" placeholder="Username">
<input id="regPass" type="password" placeholder="Password">

<button class="btn" onclick="register()">Register</button>
<div class="switch" onclick="showLogin()">Back to login</div>
</div>

<p id="msg"></p>

</div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<header>
<div class="logo">NexusSHOP</div>
<div>
<span id="user"></span>
<button class="btn" onclick="logout()">Вийти</button>
</div>
</header>

<div class="hero">
<h1>NEXUS</h1>
<p>Майбутнє техніки ⚡</p>
</div>

<div class="grid" id="products"></div>

</div>

<script>
// ===== AUTH =====
let users = JSON.parse(localStorage.getItem("users")) || {};
let currentUser = localStorage.getItem("currentUser");
let verified=false;

function verifyCheck(){
  verified=true;
  let v=document.getElementById("verify");
  v.innerText="✔ Verified";
  v.classList.add("done");
}

function showRegister(){
  loginBox.classList.add("hidden");
  registerBox.classList.remove("hidden");
  title.innerText="Register";
}

function showLogin(){
  loginBox.classList.remove("hidden");
  registerBox.classList.add("hidden");
  title.innerText="Login";
}

function register(){
  let u=regUser.value;
  let p=regPass.value;

  if(!u||!p)return msg("Заповни поля");
  if(users[u])return msg("Є такий користувач");

  users[u]={password:p};
  localStorage.setItem("users",JSON.stringify(users));
  msg("Готово! Увійди");
  showLogin();
}

function login(){
  let u=logUser.value;
  let p=logPass.value;

  if(!verified)return msg("Підтверди що ти не робот");

  if(users[u]&&users[u].password===p){
    localStorage.setItem("currentUser",u);
    start();
  }else{
    msg("Невірно");
  }
}

function logout(){
  localStorage.removeItem("currentUser");
  location.reload();
}

function msg(t){
  msg.innerText=t;
}

// START
function start(){
  auth.style.display="none";
  app.style.display="block";
  user.innerText=currentUser;
  render();
}

if(currentUser) start();

// ===== PRODUCTS =====
const products=[
{name:"RTX 4090",img:"https://images.unsplash.com/photo-1587202372775-e229f172b9d7"},
{name:"RTX 4070",img:"https://images.unsplash.com/photo-1593640408182-31c70c8268f5"},
{name:"PS5",img:"https://images.unsplash.com/photo-1606813907291-d86efa9b94db"},
{name:"Xbox",img:"https://images.unsplash.com/photo-1621259182978-fbf93132d53d"},
{name:"Monitor",img:"https://images.unsplash.com/photo-1591488320449-011701bb6704"}
];

function render(){
  let html="";
  products.forEach(p=>{
    html+=`
    <div class="card">
      <img src="${p.img}">
      <h3>${p.name}</h3>
      <button class="btn">Купити</button>
    </div>`;
  });
  productsDiv.innerHTML=html;
}

const productsDiv=document.getElementById("products");
</script>

</body>
</html>
